<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | Floating Counselling</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
  <header id="header">
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo-text">
          <img src="images/logo.png" alt="Floating Counselling Logo" class="site-logo">
          <div class="logo-brand">Floating<span>Counselling</span></div>
        </a>
        <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
          <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="navLinks">
          <a href="index.html">Home</a>
          <a href="about.html">About Us</a>
          <a href="services.html">Counselling</a>
          <a href="community.html">Community hub</a>
          <a href="holiday-school.html">Holiday School</a>
          <a href="events.html">Events</a>
          <a href="#contact">Contact</a>
          <div class="nav-actions">
            <!-- Currently on login page, so we could visually dim the login link or just keep it -->
            <a href="login.html" class="active" style="font-family: var(--font-heading); font-weight: 600; color: var(--forest-teal);">Log In</a>
            <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_donations&business=info@floatingcounselling.co.uk&currency_code=GBP" target="_blank" class="btn btn-primary" style="box-shadow: none;">Donate</a>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <div class="auth-wrapper">
      <div class="auth-blob-1"></div>
      <div class="auth-blob-2"></div>
      
      <div class="auth-card fade-in visible">
        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p>We're glad to see you again.</p>
        </div>
        
        <form action="#" method="POST">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
          </div>
          
          <div style="text-align: right; margin-bottom: 1.5rem;">
            <a href="#" style="font-size: 0.85rem; color: var(--forest-teal);">Forgot Password?</a>
          </div>
          
          <div class="auth-actions">
            <button type="submit" class="btn btn-primary">Log In</button>
            <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem; margin: 0.5rem 0;">Or</p>
            <button type="button" class="btn btn-secondary" style="background: white; color: var(--text-dark); border: 1px solid rgba(0,0,0,0.1); box-shadow: none;">
              <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width: 18px; margin-right: 10px; vertical-align: middle;"> Continue with Google
            </button>
          </div>
        </form>
        
        <div class="auth-footer">
          Don't have an account? <a href="signup.html">Create Account</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Notice: Omitting footer on auth pages creates a cleaner, focused experience -->
  
  <script>
    window.addEventListener('scroll', function() {
      const header = document.getElementById('header');
      if (window.scrollY > 50) { header.classList.add('scrolled'); } 
      else { header.classList.remove('scrolled'); }
    });
    window.dispatchEvent(new Event('scroll'));

    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');
    if(hamburger) {
      hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('active');
        hamburger.classList.toggle('active');
      });
    }
  </script>
</body>
</html>
